{% extends "base_phone.html" %}
{% set title = "Notifications" %}

{% block content %}
<div class="topbar">
  <button class="back" onclick="window.location.href='/resident/home'">⬅ Back</button>
  <div style="font-weight:700">Notifications</div>
  <div></div>
</div>

<h1>Notifications</h1>

<div class="panel">
  <div class="row space">
    <div class="hint" style="margin:0">Latest updates from admin and collectors.</div>
    <button class="secondary" onclick="loadNotes()">Refresh</button>
  </div>
  <div id="list" style="margin-top:12px"></div>
  <div id="empty" class="hint" style="display:none">No notifications yet.</div>
</div>

<script>
  function esc(s){ return (s||'').replace(/[&<>\"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;'}[c])); }

  async function markRead(){
    await fetch('/api/resident/notifications/mark_all_read', {method:'POST'});
  }

  async function loadNotes(){
    const res = await fetch('/api/resident/notifications');
    const data = await res.json();
    const list = document.getElementById('list');
    list.innerHTML = '';
    const notes = data.notifications || [];
    document.getElementById('empty').style.display = notes.length ? 'none' : 'block';
    for(const n of notes){
      const item = document.createElement('div');
      item.style.padding = '12px';
      item.style.border = '1px solid #e7e7ef';
      item.style.borderRadius = '12px';
      item.style.background = '#fff';
      item.style.marginTop = '10px';
      item.innerHTML = `
        <div style="display:flex;justify-content:space-between;gap:10px">
          <div style="font-weight:700">${esc(n.type||'info')}</div>
          <div style="color:#666;font-size:12px">${esc(n.created_at||'')}</div>
        </div>
        <div style="margin-top:6px">${esc(n.message||'')}</div>
      `;
      list.appendChild(item);
    }
    await markRead();
  }

  loadNotes();
</script>
{% endblock %}
