{% extends "base_phone.html" %}
{% set title = (user_role|capitalize ~ " List") %}

{% block content %}
<div class="topbar">
  <button class="back" onclick="window.location.href='/admin/home'">⬅ Back</button>
  <div style="font-weight:700">{{ user_role|capitalize }}s</div>
  <div></div>
</div>

<h1>{{ user_role|capitalize }} List</h1>

<div class="panel">
  <div class="row space">
    <div class="label">Total</div>
    <div style="font-weight:700" id="count">0</div>
  </div>
  <div class="hint">All data below is loaded from the database.</div>
</div>

<div class="panel">
  <div id="list" class="list"></div>
</div>

<script>
  async function load(){
    const res = await fetch(`/api/admin/users?role={{ user_role }}`);
    const data = await res.json();
    const box = document.getElementById('list');
    box.innerHTML = '';
    if(!res.ok){
      box.innerHTML = `<div class="item">${data.error || 'Failed to load'}</div>`;
      return;
    }
    const users = data.users || [];
    document.getElementById('count').innerText = users.length;
    if(!users.length){
      box.innerHTML = `<div class="item">No {{ user_role }} found.</div>`;
      return;
    }
    for(const u of users){
      const statusLine = (u.latest_status && ('{{ user_role }}'==='collector')) ? `<div class="dim">Latest Status: ${u.latest_status} ${u.latest_status_zone_id ? `(Zone ${u.latest_status_zone_id})` : ""}</div>` : '';
      const addr = (u.address && u.role==='resident') ? `<div class="dim">Address: ${u.address}</div>` : '';
      box.innerHTML += `
        <div class="item">
          <div style="font-weight:700">#${u.user_id} — ${u.name}</div>
          <div class="dim">Phone: ${u.phone || '-'} • Email: ${u.email || '-'}</div>
          <div class="dim">Zone ID: ${u.zone_id ?? '-'}</div>
          ${statusLine}
          ${addr}
        </div>
      `;
    }
  }
  load();
</script>
{% endblock %}
