{% extends "base_phone.html" %}
{% set title = "Verify Collection" %}

{% block content %}
<div class="topbar">
  <button class="back" onclick="window.location.href='/collector/home'">⬅ Back</button>
  <div style="font-weight:700">Verify Collection</div>
  <button class="secondary" onclick="load()">Load Assigned</button>
</div>

<h1>Assigned Recycling Logs</h1>

<div id="msg" class="status" style="display:none"></div>

<div class="panel">
  <div class="hint">Procedure: Resident submits → Admin assigns → Collector collects & uploads proof → Admin approves → Resident gets points.</div>
  <div id="list" class="list" style="margin-top:10px"></div>
</div>

<script>
  function imgTag(rel){
    if(!rel) return '';
    const src = rel.startsWith('http') ? rel : (`/static/${rel}`);
    return `<img src="${src}" style="width:100%;max-height:180px;object-fit:cover;border-radius:10px;border:1px solid #eee;margin-top:8px" />`;
  }

  function showMsg(t, ok=true){
    const m = document.getElementById('msg');
    m.style.display='block';
    m.className='status ' + (ok ? 'ok' : 'err');
    m.innerText=t;
  }

  async function submitDecision(logId, action){
    const file = document.getElementById(`proof_${logId}`)?.files?.[0];
    let reason = '';
    if(action === 'reject'){
      reason = prompt('Reject reason? (optional)') || '';
    }

    const fd = new FormData();
    fd.append('action', action);
    fd.append('reason', reason);
    if(file) fd.append('proof', file);

    const res = await fetch(`/api/collector/rewards/${logId}/verify`, { method:'POST', body: fd });
    const data = await res.json();
    if(!res.ok){ showMsg(data.error || 'Failed', false); return; }
    showMsg(action === 'verify' ? 'Verified. Sent to admin for final approval.' : 'Rejected.');
    load();
  }

  async function load(){
    const res = await fetch('/api/collector/rewards/pending');
    const data = await res.json();
    const box = document.getElementById('list');
    box.innerHTML='';
    if(!res.ok){ box.innerHTML = `<div class="item">${data.error || 'Failed'}</div>`; return; }
    const rows = data.requests || [];
    if(!rows.length){ box.innerHTML = `<div class="item">No assigned logs right now.</div>`; return; }

    for(const r of rows){
      box.innerHTML += `
        <div class="item" style="padding:14px">
          <div style="font-weight:700">Log #${r.log_id} — Resident #${r.resident_id} (${r.resident_name})</div>
          <div class="dim">${r.waste_type}, ${r.weight}kg • Zone: ${r.zone_name}</div>
          <div class="dim">Submitted: ${r.created_at}</div>
          ${imgTag(r.image_url)}
          <label style="margin-top:10px">Collector Proof Photo (required to verify)</label>
          <input id="proof_${r.log_id}" type="file" accept="image/*" capture="environment" />
          <div class="row" style="margin-top:10px">
            <button onclick="submitDecision(${r.log_id}, 'verify')">Verify + Upload Proof</button>
            <button class="secondary" onclick="submitDecision(${r.log_id}, 'reject')">Reject</button>
          </div>
        </div>
      `;
    }
  }

  load();
</script>
{% endblock %}
