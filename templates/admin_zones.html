{% extends "base_phone.html" %}
{% set title = "Manage Zones" %}

{% block content %}
<div class="topbar">
  <button class="back" onclick="window.location.href='/admin/home'">⬅ Back</button>
  <div style="font-weight:700">Manage Zones</div>
  <div></div>
</div>

<h1>Manage Zones</h1>

<div class="panel">
  <div style="font-weight:700">Zones (tap a card)</div>
  <div id="zones" class="list"></div>
</div>

<div class="panel">
  <div style="font-weight:700">Add Zone</div>
  <label>Zone Name</label>
  <input id="name" placeholder="e.g. Zone C" />
  <label>Description</label>
  <input id="desc" placeholder="e.g. Residential Area C" />
  <div class="row">
    <button onclick="addZone()">Add Zone</button>
    <button class="secondary" onclick="loadZones()">Refresh</button>
  </div>
  <div id="msg" class="status" style="display:none"></div>
</div>

<script>
  function showMsg(text, ok=true){
    const m = document.getElementById('msg');
    m.style.display='block';
    m.className='status ' + (ok ? 'ok' : 'err');
    m.innerText=text;
  }

  async function loadZones(){
    const res = await fetch('/api/admin/zones');
    const data = await res.json();
    const box = document.getElementById('zones');
    box.innerHTML='';
    if(!res.ok){ box.innerHTML = `<div class="item">${data.error || 'Failed'}</div>`; return; }
    const zones = data.zones || [];
    if(!zones.length){ box.innerHTML = `<div class="item">No zones.</div>`; return; }
    for(const z of zones){
      box.innerHTML += `
        <div class="nav-card" style="margin-top:10px" onclick="window.location.href='/admin/zones/${z.zone_id}'">
          <div class="nav-title">Zone ${z.zone_id}: ${z.name}</div>
          <div class="nav-sub">${z.description || ''}</div>
        </div>
      `;
    }
  }

  async function addZone(){
    const payload = { name: document.getElementById('name').value.trim(), description: document.getElementById('desc').value.trim() };
    const res = await fetch('/api/admin/zones', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
    const data = await res.json();
    if(!res.ok){ showMsg(data.error || 'Failed', false); return; }
    showMsg('Zone added!');
    document.getElementById('name').value='';
    document.getElementById('desc').value='';
    loadZones();
  }

  loadZones();
</script>
{% endblock %}
