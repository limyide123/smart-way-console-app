{% extends "base_phone.html" %}
{% set title = "Assign Collector" %}

{% block content %}
<div class="topbar">
  <button class="back" onclick="window.location.href='/admin/home'">⬅ Back</button>
  <div style="font-weight:700">Assign Collector</div>
  <button class="secondary" onclick="load()">Load Submitted</button>
</div>

<h1>Submitted Recycling Logs</h1>

<div id="msg" class="status" style="display:none"></div>

<div class="panel">
  <div class="hint">Procedure: Resident submits → Admin assigns a collector → Collector verifies (uploads proof) → Admin approves → Resident gets points.</div>
  <div id="list" class="list" style="margin-top:10px"></div>
</div>

<script>
  function showMsg(t, ok=true){
    const m = document.getElementById('msg');
    m.style.display='block';
    m.className='status ' + (ok ? 'ok' : 'err');
    m.innerText=t;
  }

  function imgTag(rel){
    if(!rel) return '';
    const src = rel.startsWith('http') ? rel : (`/static/${rel}`);
    return `<img src="${src}" style="width:100%;max-height:180px;object-fit:cover;border-radius:10px;border:1px solid #eee;margin-top:8px" />`;
  }

  async function load(){
    const res = await fetch('/api/admin/recycling/submitted');
    const data = await res.json();
    const box = document.getElementById('list');
    box.innerHTML='';
    if(!res.ok){ box.innerHTML = `<div class="item">${data.error || 'Failed'}</div>`; return; }
    const rows = data.requests || [];
    if(!rows.length){ box.innerHTML = `<div class="item">No submitted logs waiting for assignment.</div>`; return; }

    for(const r of rows){
      // load collectors for zone
      let collectors = [];
      try{
        const cr = await fetch(`/api/admin/zones/${r.zone_id}/collectors`);
        const cd = await cr.json();
        if(cr.ok) collectors = cd.collectors || [];
      }catch(e){}

      const options = collectors.length
        ? collectors.map(c => `<option value="${c.user_id}">#${c.user_id} - ${c.name}</option>`).join('')
        : `<option value="">No collector assigned to this zone</option>`;

      box.innerHTML += `
        <div class="item" style="padding:14px">
          <div style="font-weight:700">Log #${r.log_id} — Resident #${r.resident_id} (${r.resident_name})</div>
          <div class="dim">${r.waste_type}, ${r.weight}kg • Zone: ${r.zone_name}</div>
          <div class="dim">Submitted: ${r.created_at} • Est. Points: ${r.points_earned}</div>
          ${imgTag(r.image_url)}
          <label style="margin-top:10px">Assign Collector (must be assigned to this zone)</label>
          <select id="collector_${r.log_id}">${options}</select>
          <div class="row" style="margin-top:10px">
            <button onclick="assign(${r.log_id})">Assign</button>
          </div>
        </div>
      `;
    }
  }

  async function assign(logId){
    const sel = document.getElementById(`collector_${logId}`);
    const collector_id = parseInt(sel.value || '0');
    if(!collector_id){ showMsg('Please select a collector.', false); return; }
    const res = await fetch(`/api/admin/recycling/${logId}/assign`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({collector_id})
    });
    const data = await res.json();
    if(!res.ok){ showMsg(data.error || 'Assign failed', false); return; }
    showMsg('Assigned! Collector can now verify with proof photo.');
    load();
  }

  load();
</script>
{% endblock %}
