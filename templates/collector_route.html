{% extends "base_phone.html" %}
{% set title = "Optimized Route" %}

{% block content %}
<div class="topbar">
  <button class="back" onclick="window.location.href='/collector/home'">⬅ Back</button>
  <div style="font-weight:700">Route</div>
  <div></div>
</div>

<h1>Route Optimization</h1>

<div class="panel">
  <div class="hint">We will order your assigned collections based on distance (nearest-neighbor). For best results, tap "Use My Location".</div>
  <div class="row">
    <button onclick="optimize(true)">Use My Location</button>
    <button class="secondary" onclick="optimize(false)">Optimize without GPS</button>
  </div>
  <div id="summary" class="status" style="display:none"></div>
</div>

<div class="panel" style="margin-top:12px">
  <div style="font-weight:700">Stops</div>
  <div id="stops" style="margin-top:10px"></div>
  <div id="empty" class="hint" style="display:none">No assigned collections yet.</div>
</div>

<script>
  function esc(s){ return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;'}[c])); }
  function showSummary(text, ok=true){
    const el = document.getElementById('summary');
    el.style.display = 'block';
    el.className = 'status ' + (ok ? 'ok' : 'err');
    el.innerText = text;
  }

  async function callOptimize(start){
    const res = await fetch('/api/collector/route_optimize', {
      method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(start||{})
    });
    return {res, data: await res.json()};
  }

  async function optimize(withGps){
    document.getElementById('empty').style.display = 'none';
    document.getElementById('stops').innerHTML = '<div class="hint">Loading...</div>';
    try{
      if(withGps && navigator.geolocation){
        navigator.geolocation.getCurrentPosition(async (pos)=>{
          const out = await callOptimize({start_lat: pos.coords.latitude, start_lng: pos.coords.longitude});
          render(out.res, out.data);
        }, async ()=>{
          const out = await callOptimize({});
          render(out.res, out.data);
        }, {enableHighAccuracy:true, timeout: 10000});
      } else {
        const out = await callOptimize({});
        render(out.res, out.data);
      }
    }catch(e){
      showSummary('Failed to optimize route.', false);
      document.getElementById('stops').innerHTML = '';
    }
  }

  function render(res, data){
    if(!res.ok){ showSummary(data.error || 'Failed', false); return; }
    const stops = data.stops || [];
    const missing = data.missing || [];
    const box = document.getElementById('stops');
    box.innerHTML = '';
    if(!stops.length && !missing.length){
      document.getElementById('empty').style.display = 'block';
      showSummary('No assigned collections.', true);
      return;
    }
    showSummary(`Total distance: ${data.total_km || 0} km (estimated)`, true);
    let idx = 1;
    for(const s of stops){
      const card = document.createElement('div');
      card.style.padding = '12px';
      card.style.border = '1px solid #e7e7ef';
      card.style.borderRadius = '12px';
      card.style.background = '#fff';
      card.style.marginTop = '10px';
      const gmap = `https://www.google.com/maps?q=${encodeURIComponent(s.address_lat)},${encodeURIComponent(s.address_lng)}`;
      card.innerHTML = `
        <div style="display:flex;justify-content:space-between;gap:10px">
          <div style="font-weight:700">Stop ${idx++}: Log #${s.log_id}</div>
          <div style="color:#666;font-size:12px">+${s.distance_from_prev_km} km</div>
        </div>
        <div style="margin-top:6px">Resident: ${esc(s.resident_name||'')}</div>
        <div style="color:#666;font-size:12px;margin-top:6px">${esc(s.address||'')}</div>
        <div style="margin-top:8px"><a href="${gmap}" target="_blank" style="font-size:12px">Open in Google Maps</a></div>
      `;
      box.appendChild(card);
    }
    if(missing.length){
      const warn = document.createElement('div');
      warn.className = 'hint';
      warn.style.marginTop = '12px';
      warn.innerText = `Missing map coordinates for ${missing.length} stop(s). Ask resident to set address on map.`;
      box.appendChild(warn);
    }
  }

  // auto load once
  optimize(false);
</script>
{% endblock %}
