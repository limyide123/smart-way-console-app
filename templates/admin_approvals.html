{% extends "base_phone.html" %}
{% set title = "Approve Recycling Rewards" %}

{% block content %}
<div class="topbar">
  <button class="back" onclick="window.location.href='/admin/home'">⬅ Back</button>
  <div style="font-weight:700">Approvals</div>
  <button class="secondary" onclick="load()">Load Pending Approvals</button>
</div>

<h1>Approve Recycling Rewards</h1>

<div id="msg" class="status" style="display:none"></div>

<div class="panel">
  <div id="list" class="list"></div>
</div>

<script>
  function showMsg(text, ok=true){
    const m = document.getElementById('msg');
    m.style.display='block';
    m.className='status ' + (ok ? 'ok' : 'err');
    m.innerText=text;
  }

  async function decide(logId, action){
    let payload = { action };
    if(action === 'reject'){
      const reason = prompt('Reject reason? (optional)') || '';
      payload.reason = reason;
    }
    const res = await fetch(`/api/admin/rewards/${logId}/decision`, {
      method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload)
    });
    const data = await res.json();
    if(!res.ok){ showMsg(data.error || 'Failed', false); return; }
    showMsg('Updated!');
    load();
  }

  async function load(){
    const res = await fetch('/api/admin/rewards/pending');
    const data = await res.json();
    const box = document.getElementById('list');
    box.innerHTML='';
    if(!res.ok){ box.innerHTML = `<div class="item">${data.error || 'Failed'}</div>`; return; }
    const rows = data.requests || [];
    if(!rows.length){ box.innerHTML = `<div class="item">No pending approvals.</div>`; return; }
    for(const r of rows){
      const residentImg = r.image_url ? `<img src="/static/${r.image_url}" style="width:100%;max-height:160px;object-fit:cover;border-radius:10px;border:1px solid #eee;margin-top:8px" />` : '';
      const proofImg = r.collector_proof_url ? `<img src="/static/${r.collector_proof_url}" style="width:100%;max-height:160px;object-fit:cover;border-radius:10px;border:1px solid #eee;margin-top:8px" />` : '';
      box.innerHTML += `
        <div class="item">
          <div style="font-weight:700">Log #${r.log_id} — Resident #${r.resident_id} (${r.resident_name})</div>
          <div class="dim">${r.waste_type}, ${r.weight}kg • Points: ${r.points_earned}</div>
          <div class="dim">Zone: ${r.zone_name} • Verified by: ${r.verified_by_name || '-'} • ${r.created_at}</div>
          ${residentImg}
          <div class="dim" style="margin-top:8px">Collector proof</div>
          ${proofImg || `<div class="dim">(no proof image)</div>`}
          <div class="row" style="margin-top:8px">
            <button onclick="decide(${r.log_id}, 'approve')">Approve</button>
            <button class="secondary" onclick="decide(${r.log_id}, 'reject')">Reject</button>
          </div>
        </div>
      `;
    }
  }

  load();
</script>
{% endblock %}
