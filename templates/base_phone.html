<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>{{ title or 'Smart Waste System' }}</title>
  <link rel="stylesheet" href="/static/recycle.css">
  <style>
    /* Same phone UI as your main dashboard */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: radial-gradient(circle at top, #2b2f4a, #0f1225);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .phone {
      width: 390px;
      height: 780px;
      background: #000;
      border-radius: 40px;
      padding: 14px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.6), inset 0 0 0 2px #333;
      position: relative;
      display: flex;
      flex-direction: column;
    }
    .phone-notch {
      width: 140px;
      height: 24px;
      background: #000;
      border-radius: 0 0 14px 14px;
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
    }
    .container {
      max-width: 100%;
      margin: 0;
      padding: 18px 14px;
      height: 100%;
      overflow-y: auto;
      background: #f6f7fb;
      border-radius: 28px;
    }
    .container::-webkit-scrollbar { width: 0; }
    h1 { margin: 0 0 10px; text-align:center; font-size:20px; }
    .panel { background: #fff; border-radius: 10px; padding: 16px; margin-top: 12px; box-shadow: 0 2px 10px rgba(0,0,0,.06); }
    label { display:block; margin-top: 10px; font-size: 14px; color: #333; }
    input, select, textarea { width: 100%; padding: 10px; margin-top: 6px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    button { padding: 10px 14px; border: 0; border-radius: 8px; cursor:pointer; background: #2b6cff; color:#fff; }
    button.secondary { background: #eef2ff; color:#2b2b2b; }
    button.danger { background: #dc2626; }
    .row { display:flex; gap:10px; margin-top: 12px; align-items:center; }
    .row.space { justify-content: space-between; }
    .status { margin-top: 10px; padding: 10px; border-radius: 8px; }
    .status.ok { background:#e7fff0; color:#105a2b; }
    .status.err { background:#ffecec; color:#7a1212; }
    .hint { margin-top: 12px; color:#666; font-size: 13px; }

    /* App-like card navigation */
    .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px; }
    .nav-card {
      background: #fff;
      border: 1px solid #e7e7ef;
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 2px 10px rgba(0,0,0,.06);
      cursor: pointer;
      user-select: none;
      transition: transform .08s ease, box-shadow .08s ease, background .08s ease;
    }
    .nav-card:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(0,0,0,.10); background: #fbfbff; }
    .nav-card:active { transform: translateY(0px) scale(0.99); }
    .nav-title { font-weight: 700; margin: 0; }
    .nav-sub { margin-top: 6px; color: #666; font-size: 12px; }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 18px;
      height: 18px;
      padding: 0 6px;
      border-radius: 999px;
      background: #ef4444;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      line-height: 18px;
    }

    .topbar { display:flex; align-items:center; justify-content: space-between; gap: 10px; }
    .back { background: rgba(255,255,255,0.0); color:#2b2b2b; border: 1px solid #e5e7eb; }

    @media(max-width:400px){
      .phone { width: 100%; height: 100%; border-radius:0; padding:0; }
      .container { border-radius:0; padding:10px; }
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="phone-notch"></div>
    <div class="container">
      {% block content %}{% endblock %}
    </div>
  </div>
</body>
</html>
