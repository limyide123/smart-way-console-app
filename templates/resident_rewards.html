{% extends "base_phone.html" %}
{% set title = "Reward Store" %}

{% block content %}
<div class="topbar">
  <button class="back" onclick="window.location.href='/resident/home'">⬅ Back</button>
  <div style="font-weight:700">Reward Store</div>
  <button class="secondary" onclick="window.location.href='/resident/profile'">Profile</button>
</div>

<h1>Redeem Points (Reward Store)</h1>

<div id="status" class="status" style="display:none"></div>

<div class="panel">
  <div class="row">
    <button class="secondary" onclick="loadStore()">Load Store</button>
    <button class="secondary" onclick="loadRedemptions()">View Redemptions</button>
  </div>
  <div class="row space" style="margin-top:10px">
    <div>
      <div class="label">Your Points</div>
      <div class="big" id="myPoints">0</div>
    </div>
  </div>
</div>

<div class="panel">
  <div style="font-weight:700">Store Items</div>
  <div id="store" class="list"></div>
</div>

<div class="panel">
  <div style="font-weight:700">Redemption History</div>
  <div id="reds" class="list"></div>
</div>

<script>
  function showStatus(text, ok=true){
    const box = document.getElementById('status');
    box.style.display = 'block';
    box.className = 'status ' + (ok ? 'ok' : 'err');
    box.innerText = text;
  }

  async function loadStore(){
    const res = await fetch('/api/resident/rewards/store');
    const data = await res.json();
    if(!res.ok){ showStatus(data.error || 'Failed to load store', false); return; }

    document.getElementById('myPoints').innerText = data.points ?? 0;
    const items = data.items || [];
    const box = document.getElementById('store');
    box.innerHTML = '';

    if(!items.length){
      box.innerHTML = `<div class="item">No rewards available.</div>`;
      return;
    }

    for(const it of items){
      const can = (data.points ?? 0) >= it.cost_points;
      const btn = can
        ? `<button onclick="redeem(${it.reward_id})">Redeem (${it.cost_points} pts)</button>`
        : `<button class="secondary" disabled>Need ${it.cost_points} pts</button>`;

      box.innerHTML += `
        <div class="item">
          <div style="font-weight:700">${it.name}</div>
          <div class="dim">${it.description || ''}</div>
          <div class="dim">Cost: ${it.cost_points} points</div>
          <div class="row" style="margin-top:8px">${btn}</div>
        </div>
      `;
    }
    showStatus('Store loaded.');
  }

  async function redeem(rewardId){
    const res = await fetch('/api/resident/rewards/redeem', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ reward_id: rewardId })
    });
    const data = await res.json();
    if(!res.ok){ showStatus(data.error || 'Redeem failed', false); return; }
    showStatus('Redeemed! Status: Processing');
    await loadStore();
    await loadRedemptions();
  }

  async function loadRedemptions(){
    const res = await fetch('/api/resident/rewards/redemptions');
    const data = await res.json();
    const box = document.getElementById('reds');
    box.innerHTML = '';
    if(!res.ok){ box.innerHTML = `<div class="item">${data.error || 'Failed'}</div>`; return; }
    const rows = data.redemptions || [];
    if(!rows.length){ box.innerHTML = `<div class="item">No redemptions yet.</div>`; return; }
    for(const r of rows){
      box.innerHTML += `
        <div class="item">
          <div style="font-weight:700">${r.reward_name}</div>
          <div class="dim">Spent: ${r.points_spent} pts • <b>${r.status}</b></div>
          <div class="dim">${r.redeemed_at}</div>
        </div>
      `;
    }
  }

  // Initial load to match your sample view
  loadStore();
  loadRedemptions();
</script>
{% endblock %}
