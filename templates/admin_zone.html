{% extends "base_phone.html" %}
{% set title = "Zone Management" %}

{% block content %}
<div class="topbar">
  <button class="back" onclick="window.location.href='/admin/zones'">⬅ Back</button>
  <div style="font-weight:700">Zone Details</div>
  <div></div>
</div>

<h1>Manage Zone #{{ zone_id }}</h1>

<div id="msg" class="status" style="display:none"></div>

<div class="panel">
  <div style="font-weight:700">Edit Zone</div>
  <label>New Name</label>
  <input id="name" placeholder="e.g. Zone A Updated" />
  <label>New Description</label>
  <input id="desc" placeholder="Updated description" />
  <div class="row">
    <button onclick="updateZone()">Update Zone</button>
  </div>
</div>

<div class="panel">
  <div style="font-weight:700">Assign Collector to Zone</div>
  <label>Collector ID</label>
  <input id="collectorId" type="number" placeholder="e.g. 2" />
  <div class="row">
    <button onclick="assign()">Assign</button>
  </div>
</div>

<div class="panel">
  <div style="font-weight:700">Pickup Schedule Management</div>
  <div class="row" style="margin-top:0">
    <button class="secondary" onclick="loadSchedules()">View All Schedules</button>
  </div>
  <div id="schedules" class="list"></div>

  <div style="margin-top:14px; font-weight:700">Add Schedule</div>
  <label>Day</label>
  <select id="day">
    <option>Monday</option>
    <option>Tuesday</option>
    <option>Wednesday</option>
    <option>Thursday</option>
    <option>Friday</option>
    <option>Saturday</option>
    <option>Sunday</option>
  </select>
  <label>Time</label>
  <select id="time">
    <option>08:00</option>
    <option>09:00</option>
    <option>10:00</option>
    <option>14:00</option>
    <option>16:00</option>
    <option>18:00</option>
  </select>
  <div class="row">
    <button onclick="addSchedule()">Add</button>
  </div>
</div>

<!-- Delete zone at bottom (requested) -->
<div class="panel">
  <div style="font-weight:700; color:#b91c1c">Delete Zone</div>
  <div class="hint">This will delete the zone and related schedules. Use carefully.</div>
  <div class="row">
    <button class="danger" style="width:100%" onclick="deleteZone()">Delete Zone</button>
  </div>
</div>

<script>
  const ZONE_ID = {{ zone_id }};

  function showMsg(text, ok=true){
    const m = document.getElementById('msg');
    m.style.display = 'block';
    m.className = 'status ' + (ok ? 'ok' : 'err');
    m.innerText = text;
  }

  async function loadZone(){
    const res = await fetch(`/api/admin/zones/${ZONE_ID}`);
    const data = await res.json();
    if(!res.ok){ showMsg(data.error || 'Failed to load zone', false); return; }
    document.getElementById('name').value = data.zone.name || '';
    document.getElementById('desc').value = data.zone.description || '';
  }

  async function updateZone(){
    const payload = { name: document.getElementById('name').value.trim(), description: document.getElementById('desc').value.trim() };
    const res = await fetch(`/api/admin/zones/${ZONE_ID}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
    const data = await res.json();
    if(!res.ok){ showMsg(data.error || 'Update failed', false); return; }
    showMsg('Zone updated!');
  }

  async function assign(){
    const collector_id = parseInt(document.getElementById('collectorId').value || '0');
    if(!collector_id){ showMsg('Collector ID is required', false); return; }
    const res = await fetch('/api/admin/assign', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ collector_id, zone_id: ZONE_ID }) });
    const data = await res.json();
    if(!res.ok){ showMsg(data.error || 'Assign failed', false); return; }
    showMsg(data.message || 'Assigned!');
  }

  async function loadSchedules(){
    const res = await fetch(`/api/admin/zones/${ZONE_ID}/schedules`);
    const data = await res.json();
    const box = document.getElementById('schedules');
    box.innerHTML='';
    if(!res.ok){ box.innerHTML = `<div class="item">${data.error || 'Failed'}</div>`; return; }
    const rows = data.schedules || [];
    if(!rows.length){ box.innerHTML = `<div class="item">No schedules for this zone.</div>`; return; }
    for(const s of rows){
      box.innerHTML += `
        <div class="item">
          <div style="font-weight:700">${s.day} — ${s.time}</div>
          <div class="row" style="margin-top:8px">
            <button class="secondary" onclick="delSchedule(${s.schedule_id})">Delete</button>
          </div>
        </div>
      `;
    }
  }

  async function addSchedule(){
    const day = document.getElementById('day').value;
    const time = document.getElementById('time').value;
    const res = await fetch('/api/admin/schedules', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ zone_id: ZONE_ID, day, time }) });
    const data = await res.json();
    if(!res.ok){ showMsg(data.error || 'Add schedule failed', false); return; }
    showMsg('Schedule added!');
    loadSchedules();
  }

  async function delSchedule(id){
    const res = await fetch(`/api/admin/schedules/${id}`, { method:'DELETE' });
    const data = await res.json();
    if(!res.ok){ showMsg(data.error || 'Delete failed', false); return; }
    showMsg('Schedule deleted');
    loadSchedules();
  }

  async function deleteZone(){
    const res = await fetch(`/api/admin/zones/${ZONE_ID}`, { method:'DELETE' });
    const data = await res.json();
    if(!res.ok){ showMsg(data.error || 'Delete zone failed', false); return; }
    window.location.href = '/admin/zones';
  }

  loadZone();
  loadSchedules();
</script>
{% endblock %}
